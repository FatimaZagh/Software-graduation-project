name: rafeeq_mobile
description: A Flutter project with video player for web
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.11.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  video_player: ^2.8.0
  video_player_web: ^2.0.0
  video_player_media_kit: ^2.0.0
  media_kit: ^1.2.6
  media_kit_video: ^2.0.1
  media_kit_libs_windows_video: any
  google_fonts: ^6.0.0
  google_sign_in: ^6.2.2
  flutter_facebook_auth: ^7.1.1
  http: ^1.2.0
  go_router: ^14.6.2
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  flutter_timezone: ^5.0.2
  url_launcher: ^6.3.2
  image_picker: ^1.2.1
  shared_preferences: ^2.3.2
  file_picker: ^8.1.4
  flutter_map: ^7.0.2
  geolocator: ^13.0.2
  latlong2: ^0.9.1
  flutter_map_dragmarker: ^7.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/
    - assets/videos/hospital.mp4
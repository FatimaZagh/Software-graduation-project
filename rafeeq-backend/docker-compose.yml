services:
  postgres:
    image: postgres:16-alpine
    container_name: rafeeq_pharmacy_pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rafeeq_db
    ports:
      - "5432:5432"
    volumes:
      - rafeeq_pharmacy_data:/var/lib/postgresql/data

volumes:
  rafeeq_pharmacy_data:
